[package]
name = "xoxo"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Personal AI assistant: daemon with optional TUI overlay."

[features]
default = []
# Optional TUI overlay. Turning it on also routes logs through the bus so the
# overlay can render a diagnostics pane.
tui = ["dep:xoxo-tui", "dep:crossterm", "xoxo-core/log-broadcast"]
# Opt-in: pull the concierge agent (broader personal-assistant capabilities).
concierge = ["dep:concierge"]

[dependencies]
xoxo-core = { workspace = true }
nerd = { workspace = true }
concierge = { workspace = true, optional = true }
xoxo-tui = { workspace = true, optional = true }
crossterm = { version = "0.29", optional = true }

tokio = { workspace = true }
anyhow = { workspace = true }
clap = { version = "4", features = ["derive"] }
uuid = { version = "1" }
comrak = "0.52.0"

[lints]
workspace = true
